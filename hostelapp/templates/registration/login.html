<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | Hostel Assist</title>

    <!-- Google Font: Source Sans Pro -->
    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Source+Sans+Pro:300,400,400i,700&display=fallback">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- AdminLTE CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/css/adminlte.min.css">

    <style>
        body {
            background: linear-gradient(135deg, #f0f7f0 0%, #e6f0e6 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .login-box {
            margin: 0 auto;
            max-width: 500px;
            width: 100%;
            padding: 20px;
        }

        /* Green theme for cards */
        .card.card-outline.card-primary {
            border-top: 3px solid #28a745;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(40, 167, 69, 0.15);
            background: white;
        }

        .card-header {
            background: white;
            border-bottom: 1px solid #e0f0e0;
        }

        .card-header a {
            color: #28a745 !important;
            text-decoration: none;
        }

        .card-header a:hover {
            color: #218838 !important;
        }

        /* Green theme for navigation pills */
        .nav-pills .nav-link {
            color: #28a745;
            border: 1px solid #d4edda;
            margin: 0 2px;
            background: white;
        }

        .nav-pills .nav-link:hover {
            background: #d4edda;
            color: #218838;
        }

        .nav-pills .nav-link.active {
            background: linear-gradient(135deg, #28a745 0%, #34ce57 100%);
            border-color: #28a745;
            color: white !important;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
        }

        /* Green theme for buttons */
        .btn-primary {
            background: linear-gradient(135deg, #28a745 0%, #34ce57 100%);
            border: none;
            border-radius: 25px;
            padding: 8px 25px;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(40, 167, 69, 0.3);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background: linear-gradient(135deg, #218838 0%, #28a745 100%);
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(40, 167, 69, 0.4);
        }

        /* Input group styling */
        .input-group-text {
            background: linear-gradient(135deg, #f8fff8 0%, #f0f7f0 100%);
            border: 1px solid #d4edda;
            color: #28a745;
        }

        .form-control {
            border: 1px solid #d4edda;
            border-radius: 25px 0 0 25px !important;
            padding: 10px 20px;
            background: white;
        }

        .form-control:focus {
            border-color: #28a745;
            box-shadow: 0 0 0 0.2rem rgba(40, 167, 69, 0.25);
        }

        .input-group .input-group-append .input-group-text {
            border-radius: 0 25px 25px 0;
            background: white;
        }

        /* Login message styling */
        .login-box-msg {
            color: #495057;
            font-size: 1.1rem;
            margin-bottom: 25px;
            position: relative;
            display: inline-block;
            padding-bottom: 10px;
            border-bottom: 2px solid #d4edda;
        }

        /* Remember me checkbox styling */
        .form-check-input:checked {
            background-color: #28a745;
            border-color: #28a745;
        }

        .form-check-label {
            color: #495057;
        }

        /* Alert styling */
        .alert-danger {
            background: #fff5f5;
            border: 1px solid #ffd7d7;
            border-radius: 10px;
            color: #dc3545;
            padding: 15px;
        }

        /* Role icons */
        .nav-link i {
            margin-right: 8px;
        }

        /* Card header styling */
        .card-header .h1 {
            font-weight: 600;
            margin: 0;
            font-size: 2rem;
        }

        .card-header .h1 b {
            color: #28a745;
        }

        /* Responsive adjustments */
        @media (max-width: 576px) {
            .login-box {
                padding: 10px;
            }

            .nav-pills .nav-link {
                padding: 8px 5px;
                font-size: 0.9rem;
            }

            .btn-primary {
                padding: 8px 15px;
            }
        }

        /* Custom green and white accents */
        .text-green {
            color: #28a745;
        }

        .bg-soft-green {
            background: linear-gradient(135deg, #f8fff8 0%, #f0f7f0 100%);
        }

        /* Hover effects for cards */
        .card {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(40, 167, 69, 0.2) !important;
        }

        /* Form transition */
        .tab-pane {
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="card card-outline card-primary">
            <div class="card-header text-center">
                <a href="#" class="h1"><b>Hostel</b> Management</a>
            </div>
            <div class="card-body">
                <p class="login-box-msg">Sign in to access your dashboard</p>

                <!-- Role Selection Tabs -->
                <ul class="nav nav-pills nav-justified mb-4" id="roleTab" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active" id="student-tab" data-bs-toggle="pill" data-bs-target="#student" type="button" role="tab" aria-controls="student" aria-selected="true">
                            <i class="fas fa-user-graduate"></i> Student
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="specialist-tab" data-bs-toggle="pill" data-bs-target="#specialist" type="button" role="tab" aria-controls="specialist" aria-selected="false">
                            <i class="fas fa-tools"></i> Specialist
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link" id="admin-tab" data-bs-toggle="pill" data-bs-target="#admin" type="button" role="tab" aria-controls="admin" aria-selected="false">
                            <i class="fas fa-user-cog"></i> Admin
                        </button>
                    </li>
                </ul>

                <!-- Role-based Login Forms -->
                <div class="tab-content" id="roleTabContent">
                    <!-- Student Login Form -->
                    <div class="tab-pane fade show active" id="student" role="tabpanel" aria-labelledby="student-tab">
                        <form method="post" action="{% url 'hostelapp:login' %}">
                            {% csrf_token %}
                            <input type="hidden" name="role" value="student">

                            <div class="input-group mb-3">
                                <input type="text" name="username" class="form-control" placeholder="Student ID / Username" required>
                                <div class="input-group-append">
                                    <div class="input-group-text">
                                        <span class="fas fa-id-card"></span>
                                    </div>
                                </div>
                            </div>

                            <div class="input-group mb-3">
                                <input type="password" name="password" class="form-control" placeholder="Password" required>
                                <div class="input-group-append">
                                    <div class="input-group-text">
                                        <span class="fas fa-lock"></span>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-8">
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" id="student_remember">
                                        <label class="form-check-label" for="student_remember">Remember Me</label>
                                    </div>
                                </div>
                                <div class="col-4">
                                    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                                </div>
                            </div>
                        </form>
                    </div>

                    <!-- Specialist Login Form -->
                    <div class="tab-pane fade" id="specialist" role="tabpanel" aria-labelledby="specialist-tab">
                        <form method="post" action="{% url 'hostelapp:login' %}">
                            {% csrf_token %}
                            <input type="hidden" name="role" value="professional">

                            <div class="input-group mb-3">
                                <input type="text" name="username" class="form-control" placeholder="Staff ID / Username" required>
                                <div class="input-group-append">
                                    <div class="input-group-text">
                                        <span class="fas fa-briefcase"></span>
                                    </div>
                                </div>
                            </div>

                            <div class="input-group mb-3">
                                <input type="password" name="password" class="form-control" placeholder="Password" required>
                                <div class="input-group-append">
                                    <div class="input-group-text">
                                        <span class="fas fa-lock"></span>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-8">
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" id="specialist_remember">
                                        <label class="form-check-label" for="specialist_remember">Remember Me</label>
                                    </div>
                                </div>
                                <div class="col-4">
                                    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                                </div>
                            </div>
                        </form>
                    </div>

                    <!-- Admin Login Form -->
                    <div class="tab-pane fade" id="admin" role="tabpanel" aria-labelledby="admin-tab">
                        <form method="post" action="{% url 'hostelapp:login' %}">
                            {% csrf_token %}
                            <input type="hidden" name="role" value="admin">

                            <div class="input-group mb-3">
                                <input type="text" name="username" class="form-control" placeholder="Admin Username" required>
                                <div class="input-group-append">
                                    <div class="input-group-text">
                                        <span class="fas fa-user-shield"></span>
                                    </div>
                                </div>
                            </div>

                            <div class="input-group mb-3">
                                <input type="password" name="password" class="form-control" placeholder="Password" required>
                                <div class="input-group-append">
                                    <div class="input-group-text">
                                        <span class="fas fa-lock"></span>
                                    </div>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-8">
                                    <div class="form-check">
                                        <input type="checkbox" class="form-check-input" id="admin_remember">
                                        <label class="form-check-label" for="admin_remember">Remember Me</label>
                                    </div>
                                </div>
                                <div class="col-4">
                                    <button type="submit" class="btn btn-primary btn-block">Sign In</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>

                {% if form.errors %}
                <div class="alert alert-danger mt-3">
                    <i class="fas fa-exclamation-circle me-2"></i>
                    Invalid username or password for the selected role. Please try again.
                </div>
                {% endif %}

                <p class="mb-0 mt-3 text-center"></p>
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- AdminLTE JS -->
    <script src="https://cdn.jsdelivr.net/npm/admin-lte@3.2/dist/js/adminlte.min.js"></script>
</body>
</html>
